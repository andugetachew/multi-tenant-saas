x-common-env: &common-env
  SECRET_KEY: ${SECRET_KEY}
  DEBUG: ${DEBUG}
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: db
  DB_PORT: ${DB_PORT}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  EMAIL_HOST: ${EMAIL_HOST}
  EMAIL_PORT: ${EMAIL_PORT}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  DJANGO_SETTINGS_MODULE: core.settings
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"

x-app-base: &app-base
  build: .
  volumes:
    - .:/app
    - static_volume:/app/staticfiles
    - media_volume:/app/media
  networks:
    - saas_network
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    container_name: saas_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_network

  web:
    <<: *app-base
    container_name: saas_web
    command: >-
      sh -c "python manage.py migrate --noinput &&
            python manage.py collectstatic --noinput &&
            gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120 --access-logfile -"
    environment:
      <<: *common-env
    expose:
      - "8000"

  daphne:
    <<: *app-base
    container_name: saas_daphne
    command: daphne -b 0.0.0.0 -p 8001 core.asgi:application
    environment:
      <<: *common-env
    expose:
      - "8001"

  celery:
    <<: *app-base
    container_name: saas_celery
    command: celery -A core worker -l info --concurrency=4
    environment:
      <<: *common-env

  celery-beat:
    <<: *app-base
    container_name: saas_celery_beat
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *common-env

  nginx:
    image: nginx:alpine
    container_name: saas_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - web
      - daphne
    networks:
      - saas_network
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  saas_network:
    driver: bridge
