[pytest]
asyncio_mode = auto
DJANGO_SETTINGS_MODULE = core.settings
python_files = test_*.py
testpaths = accounts organizations projects billing notifications webhooks chat custom_fields tracking search comments ai audit dashboard core analytics activity
addopts =
    --reuse-db
    --nomigrations
    --cov=.
    --cov-report=term
    --cov-report=html
    --cov-fail-under=60
    -v
    --tb=short
markers =
    unit: Unit tests (models, serializers)
    integration: Integration tests (API + database)
    e2e: End-to-end tests
norecursedirs = .git .tox .venv venv __pycache__ node_modules media staticfiles
filterwarnings =
    ignore::DeprecationWarning:reportlab
env =
    CELERY_TASK_ALWAYS_EAGER=True
    CELERY_BROKER_URL=memory://
    CI=True
    D:DB_HOST=localhost
    D:DB_PORT=5434