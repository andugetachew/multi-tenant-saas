[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = test_*.py
testpaths = accounts organizations projects
addopts = 
    --reuse-db
    --nomigrations
    --cov=accounts.models
    --cov=accounts.views
    --cov=accounts.serializers
    --cov=organizations.models
    --cov=organizations.views
    --cov=projects.models
    --cov=projects.views
    --cov-report=term
    --cov-report=html
    --cov-fail-under=60
    -v
    --tb=short
    --ignore=billing
    --ignore=analytics
    --ignore=chat
    --ignore=custom_fields
    --ignore=logs
    --ignore=monitoring
    --ignore=reports
    --ignore=scripts
    --ignore=tracking
    --ignore=webhooks

markers =
    unit: Unit tests (models, serializers)
    integration: Integration tests (API + database)
    e2e: End-to-end tests

norecursedirs = .git .tox .venv venv __pycache__ node_modules media staticfiles billing analytics chat custom_fields logs monitoring reports scripts tracking webhooks
filterwarnings =
    ignore::DeprecationWarning:reportlab

env =
    CELERY_TASK_ALWAYS_EAGER=True
    CELERY_BROKER_URL=memory://
    CI=True