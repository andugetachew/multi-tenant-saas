name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run migrations
      env:
        DATABASE_URL: postgres://test_user:test_pass@localhost/test_db
      run: |
        python manage.py migrate
    
    - name: Run Model Tests
      env:
        DATABASE_URL: postgres://test_user:test_pass@localhost/test_db
      run: |
        python manage.py test accounts.tests.AccountModelTests
        python manage.py test organizations.tests.OrganizationModelTests
        python manage.py test projects.tests.ProjectModelTests
        python manage.py test projects.tests.TaskModelTests
    
    - name: Run API Tests
      env:
        DATABASE_URL: postgres://test_user:test_pass@localhost/test_db
      run: |
        python manage.py test accounts.tests.AccountAPITests
        python manage.py test organizations.tests.OrganizationAPITests
        python manage.py test projects.tests.ProjectAPITests
        python manage.py test projects.tests.TaskAPITests
    
    - name: Run Integration Tests
      env:
        DATABASE_URL: postgres://test_user:test_pass@localhost/test_db
      run: |
        python manage.py test end_to_end
    
    - name: Run All Tests
      env:
        DATABASE_URL: postgres://test_user:test_pass@localhost/test_db
      run: |
        python manage.py test
    
    - name: Code Coverage
      run: |
        pip install coverage
        coverage run manage.py test
        coverage report -m
  
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"